<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black & White Cafe Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
   <link rel="stylesheet" href="assets/css/test.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="#" class="logo">BLACK & WHITE CAFE</a>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="cart-container" id="cartContainer">
                <div class="cart-header">
                    <h2 class="cart-title">Your Order</h2>
                    <button class="close-cart" id="closeCart">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="cart-items" id="cartItems">
                    <!-- Cart items will be added here dynamically -->
                    <div class="empty-cart">
                        <i class="fas fa-coffee"></i>
                        <p>Your cart is empty</p>
                        <button class="continue-shopping" id="continueShopping">Browse Menu</button>
                    </div>
                </div>

                <div class="cart-summary" id="cartSummary" style="display: none;">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (10%)</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button class="checkout-btn">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Sample cafe menu items
            const menuItems = [
                {
                    id: 1,
                    name: "Black Coffee",
                    price: 3.50,
                    image: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80"
                },
                {
                    id: 2,
                    name: "Cappuccino",
                    price: 4.50,
                    image: "https://images.unsplash.com/photo-1551030173-122aabc4489c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80"
                },
                {
                    id: 3,
                    name: "Croissant",
                    price: 3.00,
                    image: "https://images.unsplash.com/photo-1623334044303-241021148842?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80"
                },
                {
                    id: 4,
                    name: "Avocado Toast",
                    price: 7.50,
                    image: "https://images.unsplash.com/photo-1559847844-5315695dadae?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=400&q=80"
                }
            ];

            let cart = [];

            // DOM elements
            const cartIcon = document.getElementById('cartIcon');
            const cartCount = document.getElementById('cartCount');
            const cartContainer = document.getElementById('cartContainer');
            const cartItems = document.getElementById('cartItems');
            const cartSummary = document.getElementById('cartSummary');
            const closeCart = document.getElementById('closeCart');
            const continueShopping = document.getElementById('continueShopping');
            const subtotalElement = document.getElementById('subtotal');
            const taxElement = document.getElementById('tax');
            const totalElement = document.getElementById('total');

            // Toggle cart visibility
            cartIcon.addEventListener('click', function() {
                cartContainer.style.display = 'block';
                renderCart();
            });

            closeCart.addEventListener('click', function() {
                cartContainer.style.display = 'none';
            });

            continueShopping.addEventListener('click', function() {
                // In a real app, this would navigate to the menu
                alert('Redirecting to menu...');
            });

            // Add sample items to cart for demonstration
            function initializeDemoCart() {
                // Add two items to cart for demo purposes
                addToCart(1);
                addToCart(2);
                addToCart(3, 2); // Add 2 croissants
            }

            // Add item to cart
            function addToCart(itemId, quantity = 1) {
                const item = menuItems.find(i => i.id === itemId);
                if (!item) return;

                const existingItem = cart.find(i => i.id === itemId);
                if (existingItem) {
                    existingItem.quantity += quantity;
                } else {
                    cart.push({
                        id: item.id,
                        name: item.name,
                        price: item.price,
                        image: item.image,
                        quantity: quantity
                    });
                }

                updateCartCount();
                renderCart();
            }

            // Remove item from cart
            function removeFromCart(itemId) {
                cart = cart.filter(item => item.id !== itemId);
                updateCartCount();
                renderCart();
            }

            // Update quantity of item in cart
            function updateQuantity(itemId, newQuantity) {
                const item = cart.find(i => i.id === itemId);
                if (item) {
                    if (newQuantity > 0) {
                        item.quantity = newQuantity;
                    } else {
                        removeFromCart(itemId);
                    }
                }
                updateCartCount();
                renderCart();
            }

            // Update cart count display
            function updateCartCount() {
                const count = cart.reduce((total, item) => total + item.quantity, 0);
                cartCount.textContent = count;
            }

            // Calculate cart totals
            function calculateTotals() {
                const subtotal = cart.reduce((total, item) => total + (item.price * item.quantity), 0);
                const tax = subtotal * 0.10; // 10% tax
                const total = subtotal + tax;

                return {
                    subtotal: subtotal.toFixed(2),
                    tax: tax.toFixed(2),
                    total: total.toFixed(2)
                };
            }

            // Render cart items
            function renderCart() {
                if (cart.length === 0) {
                    cartItems.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-coffee"></i>
                            <p>Your cart is empty</p>
                            <button class="continue-shopping" id="continueShopping">Browse Menu</button>
                        </div>
                    `;
                    cartSummary.style.display = 'none';
                    document.getElementById('continueShopping').addEventListener('click', function() {
                        alert('Redirecting to menu...');
                    });
                    return;
                }

                cartSummary.style.display = 'block';
                
                let itemsHTML = '';
                cart.forEach(item => {
                    itemsHTML += `
                        <div class="cart-item" data-id="${item.id}">
                            <img src="${item.image}" alt="${item.name}" class="item-image">
                            <div class="item-details">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price">$${item.price.toFixed(2)}</div>
                                <div class="item-quantity">
                                    <button class="quantity-btn minus" data-id="${item.id}">-</button>
                                    <input type="number" class="quantity-input" value="${item.quantity}" min="1" data-id="${item.id}">
                                    <button class="quantity-btn plus" data-id="${item.id}">+</button>
                                </div>
                            </div>
                            <button class="remove-item" data-id="${item.id}">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                });

                cartItems.innerHTML = itemsHTML;

                // Add event listeners to quantity buttons
                document.querySelectorAll('.minus').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        const item = cart.find(i => i.id === id);
                        if (item && item.quantity > 1) {
                            updateQuantity(id, item.quantity - 1);
                        } else {
                            removeFromCart(id);
                        }
                    });
                });

                document.querySelectorAll('.plus').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        const item = cart.find(i => i.id === id);
                        if (item) {
                            updateQuantity(id, item.quantity + 1);
                        }
                    });
                });

                document.querySelectorAll('.quantity-input').forEach(input => {
                    input.addEventListener('change', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        const newQuantity = parseInt(this.value) || 1;
                        updateQuantity(id, newQuantity);
                    });
                });

                document.querySelectorAll('.remove-item').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.getAttribute('data-id'));
                        removeFromCart(id);
                    });
                });

                // Update totals
                const totals = calculateTotals();
                subtotalElement.textContent = `$${totals.subtotal}`;
                taxElement.textContent = `$${totals.tax}`;
                totalElement.textContent = `$${totals.total}`;
            }

            // Initialize demo cart
            initializeDemoCart();
        });
    </script>
</body>
</html>
