<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Admin - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Animation for modal */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-animation {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* Custom checkbox */
        .custom-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        
        .custom-checkbox:checked {
            background-color: #333;
        }
        
        .custom-checkbox:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 14px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
       <div id="admin-navbar"></div>
        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold">User Management</h2>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <input type="text" placeholder="Search..." class="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                    <button class="p-2 text-gray-600 hover:text-black">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </header>

            <!-- Content -->
            <main class="p-6">
                <!-- Action Bar -->
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <button id="addUserBtn" class="bg-black text-white px-4 py-2 rounded-lg hover:bg-gray-800 transition flex items-center">
                            <i class="fas fa-plus mr-2"></i> Add User
                        </button>
                    </div>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center">
                            <label class="mr-2 text-sm">Show:</label>
                            <select class="border rounded p-1 text-sm focus:outline-none">
                                <option>10</option>
                                <option>25</option>
                                <option>50</option>
                                <option>100</option>
                            </select>
                        </div>
                        <div class="flex items-center">
                            <label class="mr-2 text-sm">Filter:</label>
                            <select class="border rounded p-1 text-sm focus:outline-none">
                                <option>All</option>
                                <option>Active</option>
                                <option>Inactive</option>
                                <option>Admin</option>
                                <option>Staff</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Login</th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="usersTableBody">
                                <!-- Users will be populated here by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                        <div class="flex-1 flex justify-between sm:hidden">
                            <a href="#" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"> Previous </a>
                            <a href="#" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50"> Next </a>
                        </div>
                        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                            <div>
                                <p class="text-sm text-gray-700">
                                    Showing <span class="font-medium">1</span> to <span class="font-medium">5</span> of <span class="font-medium">12</span> users
                                </p>
                            </div>
                            <div>
                                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only">Previous</span>
                                        <i class="fas fa-chevron-left"></i>
                                    </a>
                                    <a href="#" aria-current="page" class="z-10 bg-gray-200 border-gray-500 text-gray-800 relative inline-flex items-center px-4 py-2 border text-sm font-medium"> 1 </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium"> 2 </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium"> 3 </a>
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only">Next</span>
                                        <i class="fas fa-chevron-right"></i>
                                    </a>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="addUserModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md modal-animation">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">Add New User</h3>
                    <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="addUserForm">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="name">Full Name</label>
                        <input type="text" id="name" name="name" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="email">Email</label>
                        <input type="email" id="email" name="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="role">Role</label>
                        <select id="role" name="role" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="staff">Staff</option>
                            <option value="cashier">Cashier</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="status">Status</label>
                        <div class="flex items-center">
                            <input type="radio" id="active" name="status" value="active" class="mr-2" checked>
                            <label for="active" class="mr-4">Active</label>
                            <input type="radio" id="inactive" name="status" value="inactive" class="mr-2">
                            <label for="inactive">Inactive</label>
                        </div>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" id="cancelAddUserBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition">Add User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md modal-animation">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">Edit User</h3>
                    <button id="closeEditModalBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="editName">Full Name</label>
                        <input type="text" id="editName" name="name" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="editEmail">Email</label>
                        <input type="email" id="editEmail" name="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="editRole">Role</label>
                        <select id="editRole" name="role" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-400" required>
                            <option value="">Select Role</option>
                            <option value="admin">Admin</option>
                            <option value="manager">Manager</option>
                            <option value="staff">Staff</option>
                            <option value="cashier">Cashier</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-medium mb-2" for="editStatus">Status</label>
                        <div class="flex items-center">
                            <input type="radio" id="editActive" name="editStatus" value="active" class="mr-2">
                            <label for="editActive" class="mr-4">Active</label>
                            <input type="radio" id="editInactive" name="editStatus" value="inactive" class="mr-2">
                            <label for="editInactive">Inactive</label>
                        </div>
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button type="button" id="cancelEditUserBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-black text-white rounded-lg hover:bg-gray-800 transition">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md modal-animation">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold">Confirm Deletion</h3>
                    <button id="closeDeleteModalBtn" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <p class="mb-6">Are you sure you want to delete this user? This action cannot be undone.</p>
                <div class="flex justify-end space-x-3">
                    <button type="button" id="cancelDeleteBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100 transition">Cancel</button>
                    <button type="button" id="confirmDeleteBtn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Delete User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>

    <script>
        // Sample user data
        const users = [
            {
                id: 1,
                name: "Sarah Johnson",
                email: "sarah@cafe.com",
                role: "admin",
                status: "active",
                lastLogin: "2023-06-15 09:24",
                avatar: "https://randomuser.me/api/portraits/women/32.jpg"
            },
            {
                id: 2,
                name: "Michael Chen",
                email: "michael@cafe.com",
                role: "manager",
                status: "active",
                lastLogin: "2023-06-14 14:45",
                avatar: "https://randomuser.me/api/portraits/men/45.jpg"
            },
            {
                id: 3,
                name: "Emily Rodriguez",
                email: "emily@cafe.com",
                role: "staff",
                status: "active",
                lastLogin: "2023-06-15 08:12",
                avatar: "https://randomuser.me/api/portraits/women/68.jpg"
            },
            {
                id: 4,
                name: "David Kim",
                email: "david@cafe.com",
                role: "cashier",
                status: "inactive",
                lastLogin: "2023-06-10 11:30",
                avatar: "https://randomuser.me/api/portraits/men/22.jpg"
            },
            {
                id: 5,
                name: "Lisa Wong",
                email: "lisa@cafe.com",
                role: "staff",
                status: "active",
                lastLogin: "2023-06-15 07:55",
                avatar: "https://randomuser.me/api/portraits/women/44.jpg"
            }
        ];

        // DOM elements
        const usersTableBody = document.getElementById('usersTableBody');
        const addUserBtn = document.getElementById('addUserBtn');
        const addUserModal = document.getElementById('addUserModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelAddUserBtn = document.getElementById('cancelAddUserBtn');
        const addUserForm = document.getElementById('addUserForm');
        
        const editUserModal = document.getElementById('editUserModal');
        const closeEditModalBtn = document.getElementById('closeEditModalBtn');
        const cancelEditUserBtn = document.getElementById('cancelEditUserBtn');
        const editUserForm = document.getElementById('editUserForm');
        
        const deleteModal = document.getElementById('deleteModal');
        const closeDeleteModalBtn = document.getElementById('closeDeleteModalBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // Current user to be edited/deleted
        let currentUserId = null;

        // Render users table
        function renderUsers() {
            usersTableBody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition';
                row.innerHTML = `
                  
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10">
                                <img class="h-10 w-10 rounded-full" src="${user.avatar}" alt="${user.name}">
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${user.name}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${user.email}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                            ${user.role === 'admin' ? 'bg-purple-100 text-purple-800' : 
                              user.role === 'manager' ? 'bg-blue-100 text-blue-800' : 
                              user.role === 'staff' ? 'bg-green-100 text-green-800' : 
                              'bg-yellow-100 text-yellow-800'}">
                            ${user.role.charAt(0).toUpperCase() + user.role.slice(1)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full 
                            ${user.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                            ${user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${user.lastLogin}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="openEditModal(${user.id})" class="text-gray-600 hover:text-black mr-3">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="openDeleteModal(${user.id})" class="text-gray-600 hover:text-red-600">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                usersTableBody.appendChild(row);
            });
        }

        // Open add user modal
        addUserBtn.addEventListener('click', () => {
            addUserModal.classList.remove('hidden');
        });

        // Close add user modal
        function closeAddModal() {
            addUserModal.classList.add('hidden');
            addUserForm.reset();
        }

        closeModalBtn.addEventListener('click', closeAddModal);
        cancelAddUserBtn.addEventListener('click', closeAddModal);

        // Submit add user form
        addUserForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = new FormData(addUserForm);
            const newUser = {
                id: users.length + 1,
                name: formData.get('name'),
                email: formData.get('email'),
                role: formData.get('role'),
                status: formData.get('status'),
                lastLogin: new Date().toISOString().slice(0, 16).replace('T', ' '),
                avatar: `https://randomuser.me/api/portraits/${Math.random() > 0.5 ? 'men' : 'women'}/${Math.floor(Math.random() * 100)}.jpg`
            };
            
            users.unshift(newUser);
            renderUsers();
            closeAddModal();
            
            // Show success notification
            alert('User added successfully!');
        });

        // Open edit modal
        function openEditModal(userId) {
            currentUserId = userId;
            const user = users.find(u => u.id === userId);
            
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            
            if (user.status === 'active') {
                document.getElementById('editActive').checked = true;
            } else {
                document.getElementById('editInactive').checked = true;
            }
            
            editUserModal.classList.remove('hidden');
        }

        // Close edit modal
        function closeEditModal() {
            editUserModal.classList.add('hidden');
            editUserForm.reset();
            currentUserId = null;
        }

        closeEditModalBtn.addEventListener('click', closeEditModal);
        cancelEditUserBtn.addEventListener('click', closeEditModal);

        // Submit edit form
        editUserForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = new FormData(editUserForm);
            const userIndex = users.findIndex(u => u.id === currentUserId);
            
            if (userIndex !== -1) {
                users[userIndex] = {
                    ...users[userIndex],
                    name: formData.get('name'),
                    email: formData.get('email'),
                    role: formData.get('role'),
                    status: formData.get('editStatus')
                };
                
                renderUsers();
                closeEditModal();
                
                // Show success notification
                alert('User updated successfully!');
            }
        });

        // Open delete modal
        function openDeleteModal(userId) {
            currentUserId = userId;
            deleteModal.classList.remove('hidden');
        }

        // Close delete modal
        function closeDeleteModal() {
            deleteModal.classList.add('hidden');
            currentUserId = null;
        }

        closeDeleteModalBtn.addEventListener('click', closeDeleteModal);
        cancelDeleteBtn.addEventListener('click', closeDeleteModal);

        // Confirm delete
        confirmDeleteBtn.addEventListener('click', () => {
            const userIndex = users.findIndex(u => u.id === currentUserId);
            
            if (userIndex !== -1) {
                users.splice(userIndex, 1);
                renderUsers();
                closeDeleteModal();
                
                // Show success notification
                alert('User deleted successfully!');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderUsers();
        });
    </script>
</body>
</html>
