  <style>
    .code-input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      border-radius: 12px;
      border: 2px solid #e5e7eb;
      transition: all 0.3s;
    }

    .code-input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
      outline: none;
    }

    .code-input.filled {
      border-color: #10b981;
      background-color: rgba(16, 185, 129, 0.05);
    }
  </style>

<body class="sign-in-basic">

  <div class="page-header align-items-start min-vh-100" style="background-image: url('assets/img/coffeeBanner2.jpg');"

    <span class="mask bg-gradient-dark opacity-6"></span>
    <div class="container my-auto">
      <div class="row">
        <div class="col-lg-4 col-md-8 col-12 mx-auto">
          <div class="card z-index-0 fadeIn3 fadeInBottom">
            <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
              <div class="bg-gradient-dark shadow-dark border-radius-lg py-3 pe-1">
                <h4 class="text-white font-weight-bolder text-center mt-2 mb-0">Verify Account</h4>
                <p class="text-center text-white-50 fs-6">Please Check your Inbox to get the <br />Verification Code.
                  Click Verify to continue.</p>
                </p>

              </div>
            </div>
            <div class="card-body">
              <form role="form" class="text-start">
                <div class="input-group input-group-outline my-3">
                  <label class="form-label text-bold">Verification Code</label>
                  <input type="email" class="form-control">
                </div>

                <div class="text-center">
                  <button type="button" class="btn bg-gradient-dark w-100 my-4 mb-2">Verify</button>
                </div>
                <p class="mt-4 text-sm text-center">
                  Didn't Get the email yet? <a class="fw-bolder" href="#">Resend</a>
                </p>
              </form>
            </div>
          </div>
